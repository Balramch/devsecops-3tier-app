
services:

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    healthcheck:
      # Avoid relying on wget/curl availability in image.
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:80"]
      interval: 10s
      timeout: 2s
      retries: 6
      start_period: 20s
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - frontend-network

  frontend:
    build: 
      context: ../app/frontend
      dockerfile: Dockerfile
    container_name: frontend
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      backend:
         condition: service_healthy  
    networks:
      - frontend-network
      - backend-network
  backend:
    build: 
      context: ../app/backend
      dockerfile: Dockerfile
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: appdb
    container_name: backend
    expose:
      - "5001"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s # Increased for safety
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy  
    networks:
      - backend-network

  db:
    image: mysql:8
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: appdb
    volumes:
    - ../db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5  
    networks:
      - backend-network

volumes:
  db_data:

networks:
  frontend-network:
    driver: bridge
  backend-network:
    driver: bridge